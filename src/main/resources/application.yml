spring:
  application:
    name: molly

  profiles:
    active: dev

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=1800s

  sql:
    init:
      mode: always
      schema-locations: classpath:sql/init_schema.sql
      data-locations: classpath:sql/init_data.sql

  servlet:
    session:
      timeout: 30m
      cookie:
        name: SESSION
        http-only: true
        same-site: strict

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

pagehelper:
  helper-dialect: h2
  reasonable: true
  support-methods-arguments: true

session:
  cache-timeout: 1800
