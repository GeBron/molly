spring:
  application:
    name: molly

  profiles:
    active: dev

  redis:
    host: mature-ox-119917.upstash.io
    port: 6379
    username: ${REDIS_USERNAME}
    password: ${REDIS_PASSWORD}
    ssl: true
    timeout: 10s
    database: 0

  sql:
    init:
      mode: never

  servlet:
    session:
      timeout: 30m
      cookie:
        name: SESSION
        http-only: true
        same-site: strict

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

session:
  cache-timeout: 1800
