spring:
  application:
    name: molly

  profiles:
    active: dev

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}

  flyway:
    enabled: true
    locations: classpath:db/migration

  sql:
    init:
      mode: never

  servlet:
    session:
      timeout: 30m
      cookie:
        name: SESSION
        http-only: true
        same-site: strict

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

session:
  cache-timeout: 1800
