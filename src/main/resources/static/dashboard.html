<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>仪表盘 - Molly Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="sidebar">
    <div class="brand">Molly Admin</div>
    <div class="p-2" id="side-menu"></div>
  </div>
  <div class="main-wrapper">
    <div class="topbar">
      <div class="fw-medium text-secondary" id="page-title">仪表盘</div>
      <div class="d-flex align-items-center gap-3">
        <span class="text-secondary small" id="current-username"></span>
        <button class="btn btn-outline-secondary btn-sm" id="logout-btn">退出</button>
      </div>
    </div>
    <div class="content">
      <div class="row g-4">
        <div class="col-12">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title fw-bold">欢迎使用 Molly Admin</h5>
              <p class="card-text text-muted mb-1">当前用户：<span id="info-username"></span></p>
              <p class="card-text text-muted">角色：<span id="info-roles"></span></p>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card text-center">
            <div class="card-body">
              <div class="display-6 fw-bold text-primary">RBAC</div>
              <div class="text-muted mt-2">基于角色的权限控制</div>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card text-center">
            <div class="card-body">
              <div class="display-6 fw-bold text-success">Session</div>
              <div class="text-muted mt-2">传统 Session 认证</div>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card text-center">
            <div class="card-body">
              <div class="display-6 fw-bold text-info">AOP</div>
              <div class="text-muted mt-2">登录与操作日志记录</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/menu.js"></script>
  <script>
    $(function () {
      initLayout('仪表盘', 'dashboard');
      checkLogin(function (info) {
        $('#info-username').text(info.user.username);
        $('#info-roles').text(info.roles && info.roles.length > 0 ? info.roles.join(', ') : '-');
      });
    });
  </script>
</body>
</html>
