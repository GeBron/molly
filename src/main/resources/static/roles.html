<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>角色管理 - Molly Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/datatables.net-bs5@1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/jstree@3.3.16/dist/themes/default/style.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="sidebar">
    <div class="brand">Molly Admin</div>
    <div class="p-2" id="side-menu"></div>
  </div>
  <div class="main-wrapper">
    <div class="topbar">
      <div class="fw-medium text-secondary" id="page-title">角色管理</div>
      <div class="d-flex align-items-center gap-3">
        <span class="text-secondary small" id="current-username"></span>
        <button class="btn btn-outline-secondary btn-sm" id="logout-btn">退出</button>
      </div>
    </div>
    <div class="content">
      <div class="card mb-4">
        <div class="card-body">
          <form class="row g-3 align-items-end" id="query-form">
            <div class="col-auto">
              <label class="form-label">角色名称</label>
              <input type="text" class="form-control" id="query-role-name" placeholder="请输入角色名称">
            </div>
            <div class="col-auto">
              <label class="form-label">状态</label>
              <select class="form-select" id="query-status">
                <option value="">全部</option>
                <option value="1">启用</option>
                <option value="0">禁用</option>
              </select>
            </div>
            <div class="col-auto">
              <button type="submit" class="btn btn-primary">查询</button>
              <button type="button" class="btn btn-outline-secondary" id="btn-reset">重置</button>
            </div>
            <div class="col-auto" data-perm="role:create">
              <button type="button" class="btn btn-success" id="btn-create">新增</button>
            </div>
          </form>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <table class="table table-bordered table-striped" id="role-table" style="width:100%">
            <thead>
              <tr>
                <th>角色编码</th>
                <th>角色名称</th>
                <th>状态</th>
                <th>创建时间</th>
                <th>操作</th>
              </tr>
            </thead>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Role Modal -->
  <div class="modal fade" id="role-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="role-modal-title">新增角色</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="role-form">
            <input type="hidden" id="role-id">
            <div class="mb-3">
              <label class="form-label">角色编码</label>
              <input type="text" class="form-control" id="role-code" required>
            </div>
            <div class="mb-3">
              <label class="form-label">角色名称</label>
              <input type="text" class="form-control" id="role-name" required>
            </div>
            <div class="mb-3">
              <label class="form-label">状态</label>
              <div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="role-status" id="role-status-enable" value="1" checked>
                  <label class="form-check-label" for="role-status-enable">启用</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="role-status" id="role-status-disable" value="0">
                  <label class="form-check-label" for="role-status-disable">禁用</label>
                </div>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-primary" id="btn-save">保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Permission Assign Modal -->
  <div class="modal fade" id="perm-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">分配权限</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div id="perm-tree"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-primary" id="btn-save-perms">保存</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/datatables.net@1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/datatables.net-bs5@1.13.8/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jstree@3.3.16/dist/jstree.min.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/menu.js"></script>
  <script>
    let roleTable;
    let currentRoleId = null;
    let permissionTree = [];
    const roleModal = new bootstrap.Modal(document.getElementById('role-modal'));
    const permModal = new bootstrap.Modal(document.getElementById('perm-modal'));

    function loadPermissions() {
      return ajaxRequest({ path: '/permissions', type: 'GET' }).done(function (res) {
        permissionTree = res.data || [];
      });
    }

    function buildJsTreeData(nodes) {
      return nodes.map(function (node) {
        return {
          id: node.id,
          text: node.permName,
          state: { opened: true },
          children: node.children && node.children.length > 0 ? buildJsTreeData(node.children) : []
        };
      });
    }

    function renderTable() {
      roleTable = $('#role-table').DataTable({
        processing: true,
        serverSide: true,
        searching: false,
        ordering: false,
        pageLength: 10,
        lengthMenu: [10, 20, 50],
        language: {
          url: 'https://cdn.jsdelivr.net/npm/datatables.net-plugins@1.13.6/i18n/zh.json'
        },
        ajax: function (data, callback) {
          const params = {
            pageNum: (data.start / data.length) + 1,
            pageSize: data.length,
            roleName: $('#query-role-name').val(),
            status: $('#query-status').val()
          };
          ajaxRequest({ path: '/roles', type: 'GET', data: params }).done(function (res) {
            callback({
              draw: data.draw,
              recordsTotal: res.data.total,
              recordsFiltered: res.data.total,
              data: res.data.list
            });
          }).fail(function () {
            callback({ draw: data.draw, recordsTotal: 0, recordsFiltered: 0, data: [] });
          });
        },
        columns: [
          { data: 'roleCode' },
          { data: 'roleName' },
          {
            data: 'status',
            render: function (data) {
              return data === 1
                ? '<span class="badge text-bg-success">启用</span>'
                : '<span class="badge text-bg-danger">禁用</span>';
            }
          },
          {
            data: 'createdAt',
            render: function (data) { return formatDateTime(data); }
          },
          {
            data: null,
            render: function (data) {
              let html = '';
              html += '<button class="btn btn-sm btn-primary me-1 btn-edit" data-perm="role:update" data-id="' + data.id + '">编辑</button>';
              html += '<button class="btn btn-sm btn-outline-secondary me-1 btn-toggle" data-perm="role:update" data-id="' + data.id + '" data-status="' + data.status + '">' + (data.status === 1 ? '禁用' : '启用') + '</button>';
              html += '<button class="btn btn-sm btn-outline-info me-1 btn-perms" data-perm="role:assign-perm" data-id="' + data.id + '">分配权限</button>';
              html += '<button class="btn btn-sm btn-danger btn-delete" data-perm="role:delete" data-id="' + data.id + '">删除</button>';
              return html;
            }
          }
        ],
        drawCallback: function () {
          applyPermission();
        }
      });
    }

    function openCreate() {
      $('#role-modal-title').text('新增角色');
      $('#role-id').val('');
      $('#role-code').val('').prop('disabled', false);
      $('#role-name').val('');
      $('#role-status-enable').prop('checked', true);
      roleModal.show();
    }

    function openEdit(id) {
      ajaxRequest({ path: '/roles/' + id, type: 'GET' }).done(function (res) {
        const role = res.data;
        $('#role-modal-title').text('编辑角色');
        $('#role-id').val(role.id);
        $('#role-code').val(role.roleCode).prop('disabled', true);
        $('#role-name').val(role.roleName);
        if (role.status === 1) {
          $('#role-status-enable').prop('checked', true);
        } else {
          $('#role-status-disable').prop('checked', true);
        }
        roleModal.show();
      });
    }

    function saveRole() {
      const id = $('#role-id').val();
      const roleCode = $('#role-code').val().trim();
      const roleName = $('#role-name').val().trim();
      const status = parseInt($('input[name="role-status"]:checked').val(), 10);

      if (!roleCode || !roleName) {
        showToast('请输入角色编码和名称', 'error');
        return;
      }

      const data = { roleCode: roleCode, roleName: roleName, status: status };
      let req;
      if (id) {
        req = ajaxRequest({ path: '/roles/' + id, type: 'PUT', data: data });
      } else {
        req = ajaxRequest({ path: '/roles', type: 'POST', data: data });
      }
      req.done(function () {
        showToast('保存成功', 'success');
        roleModal.hide();
        roleTable.ajax.reload();
      });
    }

    function toggleStatus(id, currentStatus) {
      const newStatus = currentStatus === 1 ? 0 : 1;
      ajaxRequest({ path: '/roles/' + id + '/status', type: 'PUT', data: { status: newStatus } }).done(function () {
        showToast('状态更新成功', 'success');
        roleTable.ajax.reload();
      });
    }

    function deleteRole(id) {
      confirmDialog('确认删除该角色吗？', function () {
        ajaxRequest({ path: '/roles/' + id, type: 'DELETE' }).done(function () {
          showToast('删除成功', 'success');
          roleTable.ajax.reload();
        });
      });
    }

    function openAssignPerms(id) {
      currentRoleId = id;
      ajaxRequest({ path: '/roles/' + id, type: 'GET' }).done(function (res) {
        const role = res.data;
        const selected = role.permissionIds || [];
        const treeData = buildJsTreeData(permissionTree);
        const treeEl = $('#perm-tree');
        treeEl.jstree('destroy');
        treeEl.jstree({
          core: {
            data: treeData,
            themes: { responsive: true }
          },
          plugins: ['checkbox']
        });
        treeEl.on('ready.jstree', function () {
          treeEl.jstree(true).check_node(selected);
        });
        permModal.show();
      });
    }

    function saveAssignPerms() {
      const tree = $('#perm-tree').jstree(true);
      const checked = tree.get_checked(true);
      const halfChecked = tree.get_undetermined(true);
      const ids = checked.map(function (node) { return parseInt(node.id, 10); });
      const halfIds = halfChecked.map(function (node) { return parseInt(node.id, 10); });
      const permissionIds = ids.concat(halfIds);
      ajaxRequest({ path: '/roles/' + currentRoleId + '/permissions', type: 'POST', data: { permissionIds: permissionIds } }).done(function () {
        showToast('分配成功', 'success');
        permModal.hide();
        roleTable.ajax.reload();
      });
    }

    $(function () {
      initLayout('角色管理', 'system/role');
      loadPermissions().done(function () {
        renderTable();
      });

      $('#query-form').on('submit', function (e) {
        e.preventDefault();
        roleTable.ajax.reload();
      });
      $('#btn-reset').on('click', function () {
        $('#query-role-name').val('');
        $('#query-status').val('');
        roleTable.ajax.reload();
      });
      $('#btn-create').on('click', openCreate);
      $('#btn-save').on('click', saveRole);
      $('#btn-save-perms').on('click', saveAssignPerms);

      $('#role-table').on('click', '.btn-edit', function () {
        openEdit($(this).data('id'));
      });
      $('#role-table').on('click', '.btn-toggle', function () {
        toggleStatus($(this).data('id'), $(this).data('status'));
      });
      $('#role-table').on('click', '.btn-perms', function () {
        openAssignPerms($(this).data('id'));
      });
      $('#role-table').on('click', '.btn-delete', function () {
        deleteRole($(this).data('id'));
      });
    });
  </script>
</body>
</html>
