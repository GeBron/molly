<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>操作日志 - Molly Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/datatables.net-bs5@1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="sidebar">
    <div class="brand">Molly Admin</div>
    <div class="p-2" id="side-menu"></div>
  </div>
  <div class="main-wrapper">
    <div class="topbar">
      <div class="fw-medium text-secondary" id="page-title">操作日志</div>
      <div class="d-flex align-items-center gap-3">
        <span class="text-secondary small" id="current-username"></span>
        <button class="btn btn-outline-secondary btn-sm" id="logout-btn">退出</button>
      </div>
    </div>
    <div class="content">
      <div class="card mb-4">
        <div class="card-body">
          <form class="row g-3 align-items-end" id="query-form">
            <div class="col-auto">
              <label class="form-label">时间范围</label>
              <input type="text" class="form-control" id="query-time-range" placeholder="选择时间范围" style="width: 320px;">
            </div>
            <div class="col-auto">
              <button type="submit" class="btn btn-primary">查询</button>
              <button type="button" class="btn btn-outline-secondary" id="btn-reset">重置</button>
            </div>
          </form>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <table class="table table-bordered table-striped" id="log-table" style="width:100%">
            <thead>
              <tr>
                <th>用户名</th>
                <th>模块</th>
                <th>操作</th>
                <th>请求地址</th>
                <th>方法</th>
                <th>耗时(ms)</th>
                <th>IP</th>
                <th>时间</th>
              </tr>
            </thead>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/datatables.net@1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/datatables.net-bs5@1.13.8/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/zh.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/menu.js"></script>
  <script>
    let logTable;
    let datePicker;

    function renderTable() {
      logTable = $('#log-table').DataTable({
        processing: true,
        serverSide: true,
        searching: false,
        ordering: false,
        pageLength: 10,
        lengthMenu: [10, 20, 50],
        language: {
          url: 'https://cdn.jsdelivr.net/npm/datatables.net-plugins@1.13.6/i18n/zh.json'
        },
        ajax: function (data, callback) {
          const params = {
            pageNum: (data.start / data.length) + 1,
            pageSize: data.length
          };
          const range = datePicker.selectedDates;
          if (range && range.length === 2) {
            params.startTime = range[0].toISOString();
            params.endTime = range[1].toISOString();
          }
          ajaxRequest({ path: '/logs/operation', type: 'GET', data: params }).done(function (res) {
            callback({
              draw: data.draw,
              recordsTotal: res.data.total,
              recordsFiltered: res.data.total,
              data: res.data.list
            });
          }).fail(function () {
            callback({ draw: data.draw, recordsTotal: 0, recordsFiltered: 0, data: [] });
          });
        },
        columns: [
          { data: 'username', defaultContent: '-' },
          { data: 'module', defaultContent: '-' },
          { data: 'operation', defaultContent: '-' },
          { data: 'requestUrl', defaultContent: '-' },
          { data: 'requestMethod', defaultContent: '-' },
          { data: 'duration', defaultContent: '-' },
          { data: 'ip', defaultContent: '-' },
          {
            data: 'createdAt',
            render: function (data) { return formatDateTime(data); }
          }
        ]
      });
    }

    $(function () {
      initLayout('操作日志', 'system/operation-log');
      datePicker = flatpickr('#query-time-range', {
        mode: 'range',
        enableTime: true,
        dateFormat: 'Y-m-d H:i',
        locale: 'zh',
        time_24hr: true
      });
      renderTable();

      $('#query-form').on('submit', function (e) {
        e.preventDefault();
        logTable.ajax.reload();
      });
      $('#btn-reset').on('click', function () {
        datePicker.clear();
        logTable.ajax.reload();
      });
    });
  </script>
</body>
</html>
