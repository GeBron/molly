<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <title>仪表盘</title>
</head>
<body>
  <div layout:fragment="content">
    <div class="row g-4">
      <div class="col-12">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title fw-bold">欢迎使用 Molly Admin</h5>
            <p class="card-text text-muted mb-1">当前用户：<span id="info-username" th:text="${userInfo.user.username}">用户名</span></p>
            <p class="card-text text-muted">角色：<span id="info-roles" th:text="${#lists.isEmpty(userInfo.roles)} ? '-' : ${#strings.listJoin(userInfo.roles, ', ')}">角色</span></p>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-center">
          <div class="card-body">
            <div class="display-6 fw-bold text-primary">RBAC</div>
            <div class="text-muted mt-2">基于角色的权限控制</div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-center">
          <div class="card-body">
            <div class="display-6 fw-bold text-success">Session</div>
            <div class="text-muted mt-2">传统 Session 认证</div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-center">
          <div class="card-body">
            <div class="display-6 fw-bold text-info">AOP</div>
            <div class="text-muted mt-2">登录与操作日志记录</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
