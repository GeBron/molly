<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="_csrf" th:content="${_csrf.token}" th:if="${_csrf != null}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}" th:if="${_csrf != null}">
  <title layout:title-pattern="$CONTENT_TITLE - Molly Admin">Molly Admin</title>

  <link rel="stylesheet" th:href="@{/webjars/AdminLTE/css/adminlte.min.css}">
  <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary app-default">
  <div class="app-wrapper">
    <!-- 顶部导航 -->
    <nav class="app-header navbar navbar-expand bg-body">
      <div class="container-fluid">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" data-lte-toggle="sidebar" href="#" role="button">
              <i class="bi bi-list"></i>
            </a>
          </li>
        </ul>
        <ul class="navbar-nav ms-auto">
          <li class="nav-item dropdown user-menu">
            <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">
              <span class="d-none d-md-inline" th:text="${userInfo.user.username}">用户名</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-lg dropdown-menu-end">
              <li class="user-header text-bg-primary">
                <p th:text="${userInfo.user.username}">用户名</p>
              </li>
              <li class="user-footer">
                <button type="button" class="btn btn-default btn-flat float-end" id="logout-btn">退出</button>
              </li>
            </ul>
          </li>
        </ul>
      </div>
    </nav>

    <!-- 侧边栏 -->
    <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark">
      <div class="sidebar-brand">
        <a href="/dashboard" class="brand-link">
          <span class="brand-text fw-light">Molly Admin</span>
        </a>
      </div>
      <div class="sidebar-wrapper">
        <nav class="mt-2">
          <ul class="nav sidebar-menu flex-column" data-lte-toggle="treeview" role="menu" data-accordion="false"
              th:replace="~{layout :: menuItems(${menus}, ${menuHelper})}"></ul>
        </nav>
      </div>
    </aside>

    <!-- 主内容 -->
    <main class="app-main">
      <div class="app-content-header">
        <div class="container-fluid">
          <div class="row">
            <div class="col-sm-6">
              <h1 class="m-0" th:text="${pageTitle}">标题</h1>
            </div>
          </div>
        </div>
      </div>
      <div class="app-content">
        <div class="container-fluid">
          <div layout:fragment="content">
            <!-- 子页面内容将填充此处 -->
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <div class="float-end d-none d-sm-inline">Molly Admin</div>
      <strong>© 2026 Molly</strong>
    </footer>
  </div>

  <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
  <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
  <script th:src="@{/webjars/AdminLTE/js/adminlte.min.js}"></script>
  <script th:src="@{/js/common.js}"></script>
  <script th:src="@{/js/auth.js}"></script>

  <th:block layout:fragment="page-scripts" />

  <script>
    $(function () {
      $('#logout-btn').on('click', function (e) {
        e.preventDefault();
        logout();
      });
      if (typeof initPage === 'function') {
        initPage();
      }
    });
  </script>
</body>

<!-- 菜单递归 fragment -->
<ul th:fragment="menuItems(menuList, helper)" class="nav sidebar-menu flex-column" data-lte-toggle="treeview" role="menu" data-accordion="false">
  <th:block th:each="menu : ${menuList}">
    <li class="nav-item" th:classappend="${helper.hasActiveDescendant(menu)} ? 'menu-open' : ''" th:if="${!#lists.isEmpty(menu.children)}">
      <a href="#" class="nav-link" th:classappend="${helper.hasActiveDescendant(menu)} ? 'active' : ''">
        <i class="nav-icon bi bi-folder"></i>
        <p th:text="${menu.name}">菜单名</p>
        <i class="nav-arrow bi bi-chevron-right"></i>
      </a>
      <ul class="nav nav-treeview"
          th:replace="~{layout :: menuItems(${menu.children}, ${helper})}"></ul>
    </li>
    <li class="nav-item" th:if="${#lists.isEmpty(menu.children)}">
      <a class="nav-link" th:href="@{${helper.getPagePath(menu.path)}}"
         th:classappend="${helper.isActive(menu)} ? 'active' : ''">
        <i class="nav-icon bi bi-circle"></i>
        <p th:text="${menu.name}">菜单名</p>
      </a>
    </li>
  </th:block>
</ul>
</html>
