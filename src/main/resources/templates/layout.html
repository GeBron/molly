<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title, links)">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:replace="${title}">默认标题</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <th:block th:replace="${links}" />
</head>
<body th:fragment="body(content, scripts)">
  <div class="sidebar">
    <div class="brand">Molly Admin</div>
    <div class="p-2" id="side-menu">
      <ul class="nav flex-column" th:replace="~{layout :: menu(${menus}, ${menuHelper})}"></ul>
    </div>
  </div>
  <div class="main-wrapper">
    <div class="topbar">
      <div class="fw-medium text-secondary" id="page-title" th:text="${pageTitle}">标题</div>
      <div class="d-flex align-items-center gap-3">
        <span class="text-secondary small" id="current-username" th:text="${userInfo.user.username}">用户名</span>
        <button class="btn btn-outline-secondary btn-sm" id="logout-btn">退出</button>
      </div>
    </div>
    <div class="content" th:replace="${content}"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/auth.js"></script>
  <th:block th:replace="${scripts}" />
  <script>
    $(function () {
      $('#logout-btn').on('click', function (e) {
        e.preventDefault();
        logout();
      });
      if (typeof initPage === 'function') {
        initPage();
      }
    });
  </script>
</body>

<ul class="nav flex-column" th:fragment="menu(menuList, helper)">
  <li class="nav-item" th:each="menu : ${menuList}">
    <th:block th:if="${menu.children != null && !menu.children.isEmpty()}">
      <a class="nav-link d-flex justify-content-between align-items-center" data-bs-toggle="collapse"
         th:href="'#menu-collapse-' + ${menu.id}" role="button"
         th:aria-expanded="${helper.hasActiveDescendant(menu)}"
         th:aria-controls="'menu-collapse-' + ${menu.id}">
        <span th:text="${menu.name}">菜单名</span>
        <i class="bi bi-chevron-down small"></i>
      </a>
      <div class="collapse ps-3" th:id="'menu-collapse-' + ${menu.id}"
           th:classappend="${helper.hasActiveDescendant(menu)} ? 'show' : ''">
        <ul class="nav flex-column" th:replace="~{layout :: menu(${menu.children}, ${helper})}"></ul>
      </div>
    </th:block>
    <th:block th:unless="${menu.children != null && !menu.children.isEmpty()}">
      <a class="nav-link" th:href="${helper.getPagePath(menu.path)}"
         th:classappend="${helper.isActive(menu)} ? 'active' : ''"
         th:text="${menu.name}">菜单名</a>
    </th:block>
  </li>
</ul>
</html>
