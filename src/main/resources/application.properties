spring.application.name=molly

# TiDB Cloud (MySQL-compatible) data source
spring.datasource.url=jdbc:mysql://${TiDB_USERNAME}:${TiDB_PASSWORD}@gateway01.ap-southeast-1.prod.alicloud.tidbcloud.com:4000/molly?sslMode=VERIFY_IDENTITY
spring.datasource.username=${TiDB_USERNAME}
spring.datasource.password=${TiDB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# SQL initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# JWT
jwt.access-token-secret=${JWT_ACCESS_SECRET:molly-access-secret-key-change-in-production}
jwt.access-token-expiration=7200000
jwt.refresh-token-secret=${JWT_REFRESH_SECRET:molly-refresh-secret-key-change-in-production}
jwt.refresh-token-expiration=604800000

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DB:0}

# CORS
cors.allowed-origins=http://localhost:5173
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Authorization,Content-Type
cors.exposed-headers=Authorization
cors.allow-credentials=true
cors.max-age=3600
