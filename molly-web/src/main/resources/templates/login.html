<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="_csrf" th:content="${_csrf.token}" th:if="${_csrf != null}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}" th:if="${_csrf != null}">
  <title>登录 - Molly Admin</title>
  <link rel="stylesheet" th:href="@{/webjars/AdminLTE/css/adminlte.min.css}">
  <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page bg-body-secondary">
  <div class="login-box">
    <div class="card card-outline card-primary shadow">
      <div class="card-header text-center">
        <h1 class="mb-0"><b>Molly</b> Admin</h1>
      </div>
      <div class="card-body login-card-body">
        <p class="login-box-msg">请登录以继续</p>
        <form id="login-form" th:action="@{/login}" th:object="${loginDTO}" method="POST">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf != null}">
          <div class="alert alert-danger py-2" th:if="${loginError != null}" th:text="${loginError}"></div>
          <div class="input-group mb-3">
            <input type="text" class="form-control" th:field="*{username}" placeholder="请输入用户名" required>
            <div class="input-group-text"><i class="bi bi-person"></i></div>
          </div>
          <div class="input-group mb-3">
            <input type="password" class="form-control" th:field="*{password}" placeholder="请输入密码" required>
            <div class="input-group-text"><i class="bi bi-lock"></i></div>
          </div>
          <div class="row mb-3">
            <div class="col-12">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember-me" name="remember-me" value="true">
                <label class="form-check-label" for="remember-me">记住我（7天）</label>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-12">
              <button type="submit" class="btn btn-primary w-100">登录</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
  <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
  <script th:src="@{/js/common.js}"></script>
  <script th:src="@{/js/auth.js}"></script>
</body>
</html>
