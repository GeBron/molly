<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <title>操作日志</title>
  <th:block layout:fragment="page-styles">
    <link rel="stylesheet" th:href="@{/webjars/datatables/css/dataTables.bootstrap5.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/flatpickr/dist/flatpickr.min.css}">
  </th:block>
</head>
<body>
  <div layout:fragment="content">
    <div class="card mb-4">
      <div class="card-body">
        <form class="row g-3 align-items-end" id="query-form">
          <div class="col-auto">
            <label class="form-label">时间范围</label>
            <input type="text" class="form-control" id="query-time-range" placeholder="选择时间范围" style="width: 320px;">
          </div>
          <div class="col-auto">
            <button type="submit" class="btn btn-primary">查询</button>
            <button type="button" class="btn btn-outline-secondary" id="btn-reset">重置</button>
          </div>
        </form>
      </div>
    </div>

    <div class="card">
      <div class="card-body">
        <table class="table table-bordered table-striped" id="log-table" style="width:100%">
          <thead>
            <tr>
              <th>用户名</th>
              <th>模块</th>
              <th>操作</th>
              <th>请求地址</th>
              <th>方法</th>
              <th>耗时(ms)</th>
              <th>IP</th>
              <th>时间</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="log : ${initialData.list}">
              <td th:text="${log.username} ?: '-'">用户名</td>
              <td th:text="${log.module} ?: '-'">模块</td>
              <td th:text="${log.operation} ?: '-'">操作</td>
              <td th:text="${log.requestUrl} ?: '-'">请求地址</td>
              <td th:text="${log.requestMethod} ?: '-'">方法</td>
              <td th:text="${log.duration} ?: '-'">耗时</td>
              <td th:text="${log.ip} ?: '-'">IP</td>
              <td th:text="${@templateHelper.formatDateTime(log.createdAt)}">时间</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <th:block layout:fragment="page-scripts">
      <script th:src="@{/webjars/datatables/js/jquery.dataTables.min.js}"></script>
      <script th:src="@{/webjars/datatables/js/dataTables.bootstrap5.min.js}"></script>
      <script th:src="@{/webjars/flatpickr/dist/flatpickr.min.js}"></script>
      <script th:src="@{/webjars/flatpickr/dist/l10n/zh.js}"></script>
      <script th:inline="javascript">
        let logTable;
        let datePicker;

        function renderTable() {
          logTable = $('#log-table').DataTable({
            processing: true,
            serverSide: true,
            deferLoading: [[${initialData.total}]],
            searching: false,
            ordering: false,
            pageLength: 10,
            lengthMenu: [10, 20, 50],
            language: {
              url: 'https://cdn.jsdelivr.net/npm/datatables.net-plugins@1.13.6/i18n/zh.json'
            },
            ajax: function (data, callback) {
              const params = {
                pageNum: (data.start / data.length) + 1,
                pageSize: data.length
              };
              const range = datePicker.selectedDates;
              if (range && range.length === 2) {
                params.startTime = range[0].toISOString();
                params.endTime = range[1].toISOString();
              }
              ajaxRequest({ path: '/logs/operation', type: 'GET', data: params }).done(function (res) {
                callback({
                  draw: data.draw,
                  recordsTotal: res.data.total,
                  recordsFiltered: res.data.total,
                  data: res.data.list
                });
              }).fail(function () {
                callback({ draw: data.draw, recordsTotal: 0, recordsFiltered: 0, data: [] });
              });
            },
            columns: [
              { data: 'username', defaultContent: '-', render: function (data) { return escapeHtml(data); } },
              { data: 'module', defaultContent: '-', render: function (data) { return escapeHtml(data); } },
              { data: 'operation', defaultContent: '-', render: function (data) { return escapeHtml(data); } },
              { data: 'requestUrl', defaultContent: '-', render: function (data) { return escapeHtml(data); } },
              { data: 'requestMethod', defaultContent: '-', render: function (data) { return escapeHtml(data); } },
              { data: 'duration', defaultContent: '-', render: function (data) { return escapeHtml(data); } },
              { data: 'ip', defaultContent: '-', render: function (data) { return escapeHtml(data); } },
              {
                data: 'createdAt',
                render: function (data) { return formatDateTime(data); }
              }
            ]
          });
        }

        function initPage() {
          datePicker = flatpickr('#query-time-range', {
            mode: 'range',
            enableTime: true,
            dateFormat: 'Y-m-d H:i',
            locale: 'zh',
            time_24hr: true
          });
          renderTable();

          $('#query-form').on('submit', function (e) {
            e.preventDefault();
            logTable.ajax.reload();
          });
          $('#btn-reset').on('click', function () {
            datePicker.clear();
            logTable.ajax.reload();
          });
        }
      </script>
    </th:block>
  </div>
</body>
</html>
